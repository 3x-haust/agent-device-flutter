name: agent_device_flutter_example
description: >
  A runnable sample Flutter app that demonstrates end-to-end agent-driven
  automation with agent-device-flutter. Every interactive widget is annotated
  with Semantics(identifier, label) so agent snapshots give stable @refs.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
